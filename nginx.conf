# Nginx configuration for ad2bs.prasiddha.top
# Place in /etc/nginx/sites-available/ad2bs.prasiddha.top
# Then: ln -s /etc/nginx/sites-available/ad2bs.prasiddha.top /etc/nginx/sites-enabled/

server {
    listen 80;
    listen [::]:80;
    server_name ad2bs.prasiddha.top www.ad2bs.prasiddha.top;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ad2bs.prasiddha.top www.ad2bs.prasiddha.top;

    # SSL (Let's Encrypt - certbot will fill these)
    ssl_certificate /etc/letsencrypt/live/ad2bs.prasiddha.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ad2bs.prasiddha.top/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5:!RC4:!DHE;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Root for React build
    root /var/www/ad2bs/frontend/dist;
    index index.html;

    # API proxy to Node.js backend
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Static files with caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # React Router — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # robots.txt and sitemap — no redirect
    location = /robots.txt  { access_log off; log_not_found off; }
    location = /sitemap.xml { access_log off; }
}
